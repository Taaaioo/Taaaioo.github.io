<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#bgGrad)"/>
  
  <!-- Profile circle -->
  <circle cx="200" cy="200" r="120" fill="#ffffff" opacity="0.1"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  
  <!-- User icon -->
  <circle cx="200" cy="140" r="35" fill="#ffffff" opacity="0.8"/>
  <path d="M 160 200 Q 160 180 200 180 Q 240 180 240 200 L 240 260 Q 240 280 220 280 L 180 280 Q 160 280 160 260 Z" fill="#ffffff" opacity="0.8"/>
  
  <!-- Decorative elements -->
  <circle cx="80" cy="80" r="20" fill="#ffffff" opacity="0.2"/>
  <circle cx="320" cy="320" r="30" fill="#ffffff" opacity="0.15"/>
  <rect x="320" y="60" width="40" height="40" fill="#ffffff" opacity="0.2" rx="5"/>
</svg>
