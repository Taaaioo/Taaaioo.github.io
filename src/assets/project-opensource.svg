<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="projectGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#projectGrad4)"/>
  
  <!-- Git/Open source icon -->
  <g transform="translate(300, 200)">
    <circle cx="-40" cy="-30" r="15" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="30" r="15" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <circle cx="40" cy="-30" r="15" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    
    <!-- Connection lines -->
    <line x1="-30" y1="-25" x2="-10" y2="20" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="-25" x2="10" y2="20" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    
    <!-- Center dots -->
    <circle cx="-40" cy="-30" r="4" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="30" r="4" fill="#ffffff" opacity="0.9"/>
    <circle cx="40" cy="-30" r="4" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <circle cx="100" cy="300" r="18" fill="#ffffff" opacity="0.1"/>
  <rect x="450" y="100" width="40" height="40" fill="#ffffff" opacity="0.15" rx="5"/>
</svg>
