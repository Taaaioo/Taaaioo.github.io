<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="projectGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#projectGrad2)"/>
  
  <!-- Checklist icon -->
  <g transform="translate(300, 200)">
    <rect x="-60" y="-70" width="120" height="140" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.8" rx="5"/>
    <line x1="-40" y1="-40" x2="40" y2="-40" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <line x1="-40" y1="40" x2="40" y2="40" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    
    <!-- Checkmarks -->
    <polyline points="-45,-35 -30,-20 -10,-40" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <circle cx="120" cy="120" r="20" fill="#ffffff" opacity="0.15"/>
  <circle cx="480" cy="320" r="30" fill="#ffffff" opacity="0.1"/>
</svg>
