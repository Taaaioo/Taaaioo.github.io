<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="projectGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#projectGrad3)"/>
  
  <!-- Bar chart icon -->
  <g transform="translate(300, 200)">
    <g opacity="0.8">
      <!-- Bar 1 -->
      <rect x="-50" y="-20" width="20" height="80" fill="#ffffff" opacity="0.7"/>
      <!-- Bar 2 -->
      <rect x="-15" y="-40" width="20" height="100" fill="#ffffff" opacity="0.8"/>
      <!-- Bar 3 -->
      <rect x="20" y="-60" width="20" height="120" fill="#ffffff" opacity="0.9"/>
      <!-- Bar 4 -->
      <rect x="55" y="-30" width="20" height="90" fill="#ffffff" opacity="0.7"/>
    </g>
    <line x1="-70" y1="70" x2="80" y2="70" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  </g>
  
  <rect x="80" y="80" width="35" height="35" fill="#ffffff" opacity="0.1" rx="5"/>
  <circle cx="480" cy="300" r="25" fill="#ffffff" opacity="0.15"/>
</svg>
